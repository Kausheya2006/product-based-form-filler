services:
  mongodb:
    image: mongo:latest
    container_name: productlabs_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: productlabs_app
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/chat_db}
      - DB_NAME=${DB_NAME:-chat_db}
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - HF_HUB_DISABLE_PROGRESS_BARS=0
      - PYTHONUNBUFFERED=1
      - MOCK_MODELS=${MOCK_MODELS:-false}
    depends_on:
      - mongodb
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./data_generation:/app/data_generation
      - ./src:/app/src
      - hf_cache:/root/.cache/huggingface
    command: uvicorn src.interface.api:app --host 0.0.0.0 --port 8000 --reload
    gpus: all

volumes:
  mongo_data:
  hf_cache:
