services:
  mongodb:
    image: mongo:latest
    container_name: productlabs_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  model-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: productlabs_model_service
    env_file:
      - .env
    environment:
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - HF_HUB_DISABLE_PROGRESS_BARS=0
      - PYTHONUNBUFFERED=1
      - MOCK_MODELS=false
      - USE_OLLAMA=false
      - MODEL_SERVICE_URL=
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./data_generation:/app/data_generation
      - ./src:/app/src
      - hf_cache:/root/.cache/huggingface
    command: uvicorn src.interface.model_service_api:app --host 0.0.0.0 --port 8001 --reload
    gpus: all

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: productlabs_app
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/chat_db}
      - DB_NAME=${DB_NAME:-chat_db}
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - HF_HUB_DISABLE_PROGRESS_BARS=0
      - PYTHONUNBUFFERED=1
      - MOCK_MODELS=${MOCK_MODELS:-false}
      - MODEL_SERVICE_URL=${MODEL_SERVICE_URL:-http://model-service:8001}
    # depends_on:
    #   - model-service
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./data_generation:/app/data_generation
      - ./src:/app/src
      - hf_cache:/root/.cache/huggingface
    command: uvicorn src.interface.api:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data:
  hf_cache:
