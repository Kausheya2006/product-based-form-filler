{% extends "base.html" %}
{% block title %}Conversation #{{ convo.id }}{% endblock %}
{% block content %}
<div class="card">
    <h2>Conversation #{{ convo.id }}</h2>
    {% for speaker, text in convo.history.items() %}
    <div class="turn {% if loop.index is odd %}blue{% else %}green{% endif %}"><strong>{{ speaker }}:</strong> {{ text }}</div>
    {% endfor %}
</div>
<a href="/extract/{{ form_id }}/{{ convo.id }}" class="btn btn-success">Run Extraction →</a>
{% endblock %}
