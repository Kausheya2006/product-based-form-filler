{% extends "base.html" %}
{% block title %}Create New Form{% endblock %}
{% block content %}

<div class="page-header">
    <h1>Create New Form</h1>
    <p class="page-subtitle">Define the form name, description, and the fields you want to extract from conversations.
    </p>
</div>

<form id="create-form" method="post" action="/forms">
    <div class="card">
        <div class="form-group">
            <label for="form_name">Form Name <span style="color:var(--danger)">*</span></label>
            <input type="text" id="form_name" name="form_name" required placeholder="e.g., Patient Intake Form" />
        </div>

        <div class="form-group">
            <label for="form_description">Description</label>
            <textarea id="form_description" name="form_description" rows="2"
                placeholder="e.g., Extracts patient details from a clinic intake conversation"></textarea>
            <p class="form-hint">Helps the AI understand what this form is for.</p>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
            <h3 style="margin:0;">Fields</h3>
            <span class="counter" id="field-counter">1 field</span>
        </div>

        <div id="fields-container">
            <div class="field-row">
                <input type="text" name="field_name[]" required placeholder="Field name (e.g., patient_name)"
                    style="flex:1;" />
                <select name="field_type[]" style="width:130px;">
                    <option value="string">String</option>
                    <option value="int">Integer</option>
                    <option value="float">Float</option>
                    <option value="email">Email</option>
                    <option value="phone">Phone Number</option>
                    <option value="date">Date</option>
                </select>
                <button type="button" class="btn btn-sm btn-danger" onclick="removeField(this)"
                    title="Remove field">Remove</button>
            </div>
        </div>

        <div style="margin-top:12px;">
            <button type="button" id="add-field" class="btn btn-sm">＋ Add Field</button>
        </div>
    </div>

    <div class="action-row">
        <a href="/" class="btn">← Cancel</a>
        <button type="submit" class="btn btn-success">✓ Create Form</button>
    </div>
</form>

<!-- hidden row template -->
<div id="field-template" style="display:none;">
    <div class="field-row">
        <input type="text" name="field_name[]" required placeholder="Field name (e.g., patient_name)" style="flex:1;" />
        <select name="field_type[]" style="width:130px;">
            <option value="string">String</option>
            <option value="int">Integer</option>
            <option value="float">Float</option>
            <option value="email">Email</option>
            <option value="phone">Phone Number</option>
            <option value="date">Date</option>
        </select>
        <button type="button" class="btn btn-sm btn-danger" onclick="removeField(this)"
            title="Remove field">Remove</button>
    </div>
</div>

<script src="/static/js/create_form.js"></script>
{% endblock %}
