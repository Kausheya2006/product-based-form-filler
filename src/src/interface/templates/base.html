<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ProductLabs Form Filler{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/index.css?v1">
    <link rel="icon" type="image/x-icon" href="/static/favicon.png">
</head>

<body>
    <nav class="nav">
        <a href="/" class="nav-brand">
            <span class="nav-logo">PL</span>
            ProductLabs
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link {% block nav_home %}{% endblock %}">Forms</a>
            <a href="/outputs" class="nav-link {% block nav_outputs %}{% endblock %}">Outputs</a>
            <a href="/runs" class="nav-link {% block nav_runs %}{% endblock %}">Run Logs</a>
        </div>
        {% if current_user %}
        <div class="nav-user">
            <a href="/profile" class="nav-user-btn {% block nav_profile %}{% endblock %}" title="Your profile">
                <span class="nav-avatar">{{ current_user.username[0].upper() }}</span>
                <span class="nav-username">{{ current_user.username }}</span>
            </a>
            <form method="post" action="/logout" style="margin:0;">
                <button type="submit" class="nav-logout-btn" title="Sign out">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                         fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span>Sign out</span>
                </button>
            </form>
        </div>
        {% endif %}
    </nav>

    <div class="container">
        {% if back_link %}
            <a href="{{ back_link }}" class="back-btn">← Back</a>
        {% endif %}
        {% block flash %}{% endblock %}
        <div id="content">{% block content %}{% endblock %}</div>
    </div>
</body>

</html>
