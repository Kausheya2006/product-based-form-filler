{% extends "base.html" %}
{% block title %}Edit Conversation #{{ convo.id }}{% endblock %}
{% block content %}

<div class="page-header">
    <h1>Edit Conversation #{{ convo.id }}</h1>
    <p class="page-subtitle">Modify the transcript below, then re-run extraction.</p>
</div>

<form method="post" action="/conversations/{{ convo.id }}/update" id="chatForm">
    <input type="hidden" name="form_id" value="{{ form_id }}" />
    <textarea id="raw_text" style="display:none;">{{ raw_text }}</textarea>
    <input type="hidden" name="new_content" id="new_content" />

    <div class="card">
        <div style="display:flex; gap:16px; align-items:flex-end; flex-wrap:wrap; margin-bottom:16px;">
            <div style="flex:1; min-width:220px;">
                <div class="section-label">Speakers</div>
                <div id="speakerChips" style="display:flex; gap:8px; flex-wrap:wrap; min-height:32px; align-items:center;"></div>
            </div>
            <div style="min-width:220px;">
                <div class="section-label">Add Speaker</div>
                <div style="display:flex; gap:8px;">
                    <input id="newSpeakerName" class="form-control" placeholder="e.g., Agent" style="margin-top:0;" />
                    <button type="button" class="btn" id="addSpeakerBtn" style="flex-shrink:0;">＋ Add</button>
                </div>
            </div>
        </div>

        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
            <div class="section-label" style="margin:0;">Messages</div>
            <span class="counter" id="msg-counter">0 messages</span>
        </div>

        <div id="bubbleList"></div>

        <div style="margin-top:12px;">
            <button type="button" class="btn btn-sm" id="addMsgBtn">＋ Add Message</button>
        </div>
    </div>

    <div class="action-row">
        <a href="/forms/{{ form_id }}" class="btn">← Cancel</a>
        <button type="submit" class="btn btn-success">Update &amp; Re-Extract →</button>
    </div>
</form>

<script>
  function autosizeTextarea(el) {
    el.style.height = "auto";
    el.style.height = (el.scrollHeight + 2) + "px";
  }

  function parseChat(rawText) {
    const lines = (rawText || "").split("\n");
    const messages = [];
    const speakerSet = new Set();
    const re = /^\s*([^:\n]{1,40})\s*:\s*(.*)\s*$/;
    let current = null;
    for (const line of lines) {
      const m = line.match(re);
      if (m) {
        const speaker = m[1].trim();
        const text = m[2].replace(/\s+$/, "");
        speakerSet.add(speaker);
        current = { speaker, text };
        messages.push(current);
      } else if (current) {
        current.text = (current.text + "\n" + line).replace(/\s+$/, "");
      }
    }
    return { messages, speakers: Array.from(speakerSet) };
  }

  function buildRawText(messages) {
    return messages.filter(m => m.speaker || m.text).map(m => `${m.speaker}: ${m.text}`).join("\n");
  }

  const speakerChips = document.getElementById("speakerChips");
  const bubbleList = document.getElementById("bubbleList");
  const addSpeakerBtn = document.getElementById("addSpeakerBtn");
  const newSpeakerName = document.getElementById("newSpeakerName");
  const addMsgBtn = document.getElementById("addMsgBtn");
  const newContentInput = document.getElementById("new_content");
  const chatForm = document.getElementById("chatForm");
  const rawTextEl = document.getElementById("raw_text");
  const msgCounter = document.getElementById("msg-counter");

  const parsed = parseChat(rawTextEl.value);
  let speakers = parsed.speakers.slice();
  let messages = parsed.messages.slice();

  function updateMsgCounter() {
    if (!msgCounter) return;
    const n = messages.length;
    msgCounter.textContent = n === 1 ? "1 message" : `${n} messages`;
  }

  function renderSpeakers() {
    speakerChips.innerHTML = "";
    if (speakers.length === 0) {
      const hint = document.createElement("span");
      hint.style.cssText = "font-size:0.8rem; color:var(--text-light); font-style:italic;";
      hint.textContent = "No speakers added yet";
      speakerChips.appendChild(hint);
      return;
    }
    speakers.forEach((s) => {
      const chip = document.createElement("span");
        chip.className = "chip";
        chip.innerHTML = `${s} <button type="button" style="background:none;border:none;cursor:pointer;padding:0;margin-left:2px;color:var(--text-muted);font-size:0.9em;" onclick="removeSpeaker('${s}')" title="Remove speaker">Remove</button>`;
      speakerChips.appendChild(chip);
    });
  }

  function removeSpeaker(name) {
    speakers = speakers.filter(s => s !== name);
    renderSpeakers();
    renderMessages();
  }

  function createBubbleRow(msg, idx) {
    const row = document.createElement("div");
    row.className = "bubble-row";

    const select = document.createElement("select");
    select.className = "form-control bubble-select";
    speakers.forEach(s => {
      const opt = document.createElement("option");
      opt.value = s; opt.textContent = s;
      select.appendChild(opt);
    });
    select.value = msg.speaker || speakers[0] || "Speaker";
    select.addEventListener("change", () => { messages[idx].speaker = select.value; });

    const ta = document.createElement("textarea");
    ta.className = "form-control bubble-text";
    ta.value = msg.text || "";
    ta.placeholder = "Type message…";
    ta.rows = 2;
    setTimeout(() => autosizeTextarea(ta), 0);
    ta.addEventListener("input", () => { messages[idx].text = ta.value; autosizeTextarea(ta); });

    const removeBtn = document.createElement("button");
    removeBtn.type = "button";
    removeBtn.className = "btn btn-sm btn-danger";
    removeBtn.title = "Remove message";
    removeBtn.style.flexShrink = "0";
    removeBtn.textContent = "Remove";
    removeBtn.addEventListener("click", () => {
      messages.splice(idx, 1);
      renderMessages();
    });

    row.appendChild(select);
    row.appendChild(ta);
    row.appendChild(removeBtn);
    return row;
  }

  function renderMessages() {
    bubbleList.innerHTML = "";
    messages.forEach((msg, idx) => bubbleList.appendChild(createBubbleRow(msg, idx)));
    updateMsgCounter();
  }

  function render() { renderSpeakers(); renderMessages(); }

  addSpeakerBtn.addEventListener("click", () => {
    const name = newSpeakerName.value.trim();
    if (name && !speakers.includes(name)) { speakers.push(name); render(); }
    newSpeakerName.value = "";
  });

  newSpeakerName.addEventListener("keydown", (e) => {
    if (e.key === "Enter") { e.preventDefault(); addSpeakerBtn.click(); }
  });

  addMsgBtn.addEventListener("click", () => {
    if (speakers.length === 0) { alert("Please add at least one speaker first."); return; }
    const lastSpeaker = messages[messages.length - 1]?.speaker || speakers[0] || "Speaker";
    messages.push({ speaker: lastSpeaker, text: "" });
    renderMessages();
    bubbleList.lastElementChild?.querySelector("textarea")?.focus();
  });

  chatForm.addEventListener("submit", () => { newContentInput.value = buildRawText(messages); });

  render();
</script>
{% endblock %}
