<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register — ProductLabs</title>
    <link rel="stylesheet" href="/static/css/index.css?v1">
    <link rel="icon" type="image/x-icon" href="/static/favicon.png">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gray);
            padding: 24px 20px;
        }
        .auth-box {
            width: 100%;
            max-width: 440px;
        }
        .auth-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            justify-content: center;
            text-decoration: none;
            color: var(--text);
        }
        .auth-logo {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
        }
        .auth-brand-name {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .auth-card {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px 28px;
            box-shadow: var(--shadow-md);
        }
        .auth-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 6px 0;
        }
        .auth-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin: 0 0 24px 0;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 500;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }
        .btn-full { width: 100%; margin-top: 4px; }
        .password-hint {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 4px;
        }
    </style>
</head>
<body style="margin:0;">
    <div class="auth-wrapper">
        <div class="auth-box">
            <a href="/" class="auth-brand">
                <div class="auth-logo">PL</div>
                <span class="auth-brand-name">ProductLabs</span>
            </a>

            <div class="auth-card">
                <h1 class="auth-title">Create an account</h1>
                <p class="auth-subtitle">Get started with ProductLabs for free.</p>

                {% if error %}
                <div class="flash flash-error" style="margin-bottom:18px;">{{ error }}</div>
                {% endif %}

                <form method="post" action="/register">
                    <div class="form-group">
                        <label for="email">Email <span style="color:var(--danger)">*</span></label>
                        <input type="email" id="email" name="email" required
                               placeholder="you@example.com" autocomplete="email"
                               value="{{ prefill.email or '' }}" />
                    </div>
                    <div class="form-group">
                        <label for="username">Username <span style="color:var(--danger)">*</span></label>
                        <input type="text" id="username" name="username" required
                               placeholder="your_username" autocomplete="username"
                               value="{{ prefill.username or '' }}"
                               pattern="[a-zA-Z0-9_\-]{3,32}"
                               title="3–32 characters: letters, numbers, underscores, hyphens" />
                        <p class="password-hint">3–32 characters. Letters, numbers, _ and - only.</p>
                    </div>
                    <div class="form-group">
                        <label for="password">Password <span style="color:var(--danger)">*</span></label>
                        <input type="password" id="password" name="password" required
                               placeholder="••••••••" autocomplete="new-password"
                               minlength="8" />
                        <p class="password-hint">At least 8 characters.</p>
                    </div>
                    <div class="form-group" style="margin-bottom:20px;">
                        <label for="confirm_password">Confirm Password <span style="color:var(--danger)">*</span></label>
                        <input type="password" id="confirm_password" name="confirm_password" required
                               placeholder="••••••••" autocomplete="new-password" />
                    </div>
                    <button type="submit" class="btn btn-success btn-full">Create Account →</button>
                </form>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
