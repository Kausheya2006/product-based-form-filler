<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — ProductLabs</title>
    <link rel="stylesheet" href="/static/css/index.css?v1">
    <link rel="icon" type="image/x-icon" href="/static/favicon.png">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gray);
            padding: 24px 20px;
        }
        .auth-box {
            width: 100%;
            max-width: 420px;
        }
        .auth-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            justify-content: center;
            text-decoration: none;
            color: var(--text);
        }
        .auth-logo {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 700;
            color: #fff;
        }
        .auth-brand-name {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .auth-card {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px 28px;
            box-shadow: var(--shadow-md);
        }
        .auth-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 6px 0;
        }
        .auth-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin: 0 0 24px 0;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 500;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }
        .btn-full { width: 100%; margin-top: 4px; }
    </style>
</head>
<body style="margin:0;">
    <div class="auth-wrapper">
        <div class="auth-box">
            <a href="/" class="auth-brand">
                <div class="auth-logo">PL</div>
                <span class="auth-brand-name">ProductLabs</span>
            </a>

            <div class="auth-card">
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Sign in to your account to continue.</p>

                {% if error %}
                <div class="flash flash-error" style="margin-bottom:18px;">{{ error }}</div>
                {% endif %}
                {% if success %}
                <div class="flash flash-success" style="margin-bottom:18px;">{{ success }}</div>
                {% endif %}

                <form method="post" action="/login">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required
                               placeholder="your_username" autocomplete="username"
                               value="{{ prefill_username or '' }}" />
                    </div>
                    <div class="form-group" style="margin-bottom:20px;">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required
                               placeholder="••••••••" autocomplete="current-password" />
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
                </form>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="/register">Create one</a>
            </div>
        </div>
    </div>
</body>
</html>
